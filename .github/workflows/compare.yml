name: Compare Baseline

on: 
  workflow_dispatch:
    inputs:
      run_id:
        description: "Capture workflow run ID"
        required: true
jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download baselines from specific run
        uses: dawidd6/action-download-artifact@v3
        with:
          name: baselines
          run_id: ${{ inputs.run_id }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          path: src/test/resources/baselines

      - name: Corrupt baseline (force failure)
        run: |
            file=$(find src/test/resources/baselines -name "*.json" | head -n 1)
            echo "Modifying file: $file"
            cat "$file" | head -n 20
            sed -i 's/"httpStatus"[[:space:]]*:[[:space:]]*200/"httpStatus": 500/' "$file"
            echo "After modification:"
            cat "$file" | head -n 20

      - name: Verify baselines exist (sanity check)
        run: ls -R src/test/resources/baselines

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw clean test

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: junit-results
          path: target/surefire-reports/*.xml
          reporter: java-junit
