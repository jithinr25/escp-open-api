name: Capture Baseline

on:
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
         distribution: temurin
         java-version: 21

      - name: Capture baselines
        run: ./mvnw clean test -Desco.mode=capture

      - name: Upload baselines
        uses: actions/upload-artifact@v4
        with:
          name: baselines
          path: src/test/resources/baselines
